<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>E-STOCK | Gestión de Inventario</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h1>🛒 E-STOCK</h1>
    <p>Tu ecosistema de gestión e-commerce</p>
    
    <div style="display: flex; justify-content: center; gap: 20px;">
        <div class="form-container">
            <h2>Iniciar sesión</h2>
            <input id="loginEmail" type="email" placeholder="Correo electrónico" required>
            <input id="loginPassword" type="password" placeholder="Contraseña" required>
            <button onclick="login()">Entrar</button>
        </div>
        <div class="form-container">
            <h2>Registrarse</h2>
            <input id="regName" type="text" placeholder="Nombre completo" required>
            <input id="regEmail" type="email" placeholder="Correo electrónico" required>
            <input id="regPassword" type="password" placeholder="Contraseña" required>
            <button onclick="register()">Crear cuenta</button>
        </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
